<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC 音频分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            color: #00d9ff;
        }
        .section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }
        .section h2 {
            color: #00d9ff;
            margin-bottom: 16px;
            font-size: 1.3rem;
            border-bottom: 1px solid rgba(0, 217, 255, 0.3);
            padding-bottom: 10px;
        }
        .image-container {
            text-align: center;
        }
        .image-container img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .audio-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .audio-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .audio-item h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .audio-item audio {
            width: 100%;
            height: 40px;
        }
        .audio-item audio::-webkit-media-controls-panel {
            background: rgba(0, 217, 255, 0.1);
        }
        .info {
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AEC 音频分析展示</h1>

        <div class="section">
            <h2>频谱分析图</h2>
            <div class="image-container">
                <img src="wav_spectrum.png" alt="音频频谱分析图">
            </div>
        </div>

        <div class="section">
            <h2>音频播放器 (48kHz 采样率)</h2>
            <div class="audio-list">
			    <div class="audio-item">
                    <h3>参考信号 (reverse0)</h3>
                    <audio controls>
                        <source src="audio/reverse0.wav" type="audio/wav">
                        您的浏览器不支持 audio 元素。
                    </audio>
                    <p class="info">扬声器播放的参考信号</p>
                </div>
				
                <div class="audio-item">
                    <h3>原始输入音频 (input0)</h3>
                    <audio controls>
                        <source src="audio/input0.wav" type="audio/wav">
                        您的浏览器不支持 audio 元素。
                    </audio>
                    <p class="info">原始麦克风输入信号</p>
                </div>

                <div class="audio-item">
                    <h3>自适应滤波器输出</h3>
                    <audio controls>
                        <source src="audio/output-1_filter_fixdelay44ms.wav" type="audio/wav">
                        您的浏览器不支持 audio 元素。
                    </audio>
                    <p class="info">经过 AEC-自适应滤波器处理，固定延迟补偿 44ms</p>
                </div>

                <div class="audio-item">
                    <h3>非线性抑制输出</h3>
                    <audio controls>
                        <source src="audio/output-1_fix-delay-44ms.wav" type="audio/wav">
                        您的浏览器不支持 audio 元素。
                    </audio>
                    <p class="info">经过 AEC-NLP处理</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
